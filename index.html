<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Fida Ali Zada (alizada-dev)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <span id="loader"></span>

    <header class="header">
      <h1>Game of Thrones</h1>
    </header>

    <main id="root">

      <!-- filtering container -->
      <section id="filter-container">

        <select id="select">
          <!-- <option></option> -->
        </select>

        <p id="episode-count"></p>

        <input type="text" id="search" placeholder="Search an episode here" />
      </section>

      <!-- Episodes container -->
      <section id="main-container"></section>

      <span id="message"></span>
      <span id="errorMessage"></span>

      <!-- Template -->
      <template id="card">
        <a class="episode-link" target="_blank">
          <h3 class="name">Episode name</h3>
          <img alt="Episode image" />
          <p class="summary">Episode summary</p>
        </a>
      </template>
    </main>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
